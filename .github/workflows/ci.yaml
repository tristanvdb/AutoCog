name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 1: Debug + Coverage (ctest + pytest)
  # ===========================================================================
  test-coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache gcovr

      - name: Install Python dependencies
        run: pip install pytest pytest-cov pybind11 scikit-build-core

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-debug-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
          restore-keys: ccache-debug-${{ runner.os }}-

      - name: Install autocog (debug + coverage)
        run: |
          pip install ".[server]" --no-build-isolation \
            --config-settings="build-dir=build" \
            --config-settings="cmake.define.CMAKE_BUILD_TYPE=Debug" \
            --config-settings="cmake.define.COVERAGE=ON" \
            --config-settings="cmake.define.AUTOCOG_TUNED=OFF" \
            --config-settings="cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache" \
            --config-settings="cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"

      - name: Run ctest
        working-directory: build
        run: |
          set -o pipefail
          find . -name "*.gcda" -delete
          ctest -j$(nproc) --timeout 120 --output-on-failure 2>&1 | tee ctest.log

      - name: Run pytest
        run: |
          set -o pipefail
          python -m pytest tests/integration/modules tests/units/modules \
            --cov=autocog \
            --cov-report=json:coverage_py.json \
            --timeout 120 \
            -q 2>&1 | tee pytest.log

      - name: Generate C++ coverage
        working-directory: build
        run: |
          gcovr -r "${{ github.workspace }}" . \
            --filter "${{ github.workspace }}/libs/" \
            --filter "${{ github.workspace }}/tools/" \
            --filter "${{ github.workspace }}/bindings/" \
            --gcov-ignore-errors=no_working_dir_found \
            --json coverage_cxx.json \
            2>/dev/null

      - name: Generate coverage report
        run: |
          python tests/coverage_report.py \
            build/coverage_cxx.json coverage_py.json \
            -o coverage.md

      - name: Extract summary
        id: coverage
        run: |
          python3 << 'PYEOF'
          import json, re, os

          with open("build/coverage_cxx.json") as f:
            cxx = json.load(f)
          cxx_total = sum(len(e["lines"]) for e in cxx.get("files", []))
          cxx_covered = sum(sum(1 for l in e["lines"] if l["count"] > 0) for e in cxx.get("files", []))
          cxx_pct = round(100 * cxx_covered / cxx_total, 1) if cxx_total else 0

          with open("coverage_py.json") as f:
            py = json.load(f)
          py_pct = round(py.get("totals", {}).get("percent_covered", 0), 1)

          with open("build/ctest.log") as f:
            ctest_text = f.read()
            m = re.search(r"(\d+) tests failed out of (\d+)", ctest_text)
            if m:
              ctest_count = int(m.group(2)) - int(m.group(1))
            else:
              m = re.search(r"(\d+) tests passed", ctest_text)
              ctest_count = int(m.group(1)) if m else 0
          with open("pytest.log") as f:
            m = re.search(r"(\d+) passed", f.read())
            pytest_count = int(m.group(1)) if m else 0

          summary = {
            "ctest": ctest_count, "pytest": pytest_count,
            "cxx_coverage": cxx_pct, "py_coverage": py_pct,
          }
          with open("coverage_summary.json", "w") as f:
            json.dump(summary, f, indent=2)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            for k, v in summary.items():
              f.write(f"{k}={v}\n")

          print(f"ctest={ctest_count} pytest={pytest_count} C++={cxx_pct}% Python={py_pct}%")
          PYEOF

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.md
            coverage_summary.json

      - name: Job summary
        run: |
          echo "### Coverage Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ctest | ${{ steps.coverage.outputs.ctest }} passed |" >> $GITHUB_STEP_SUMMARY
          echo "| pytest | ${{ steps.coverage.outputs.pytest }} passed |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ coverage | ${{ steps.coverage.outputs.cxx_coverage }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Python coverage | ${{ steps.coverage.outputs.py_coverage }}% |" >> $GITHUB_STEP_SUMMARY

      - name: Update ctest badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-ctest.json
          label: ctest
          message: "${{ steps.coverage.outputs.ctest }} passed"
          color: brightgreen

      - name: Update pytest badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-pytest.json
          label: pytest
          message: "${{ steps.coverage.outputs.pytest }} passed"
          color: brightgreen

      - name: Update C++ coverage badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-cxx-coverage.json
          label: C++ coverage
          message: "${{ steps.coverage.outputs.cxx_coverage }}%"
          valColorRange: ${{ steps.coverage.outputs.cxx_coverage }}
          minColorRange: 40
          maxColorRange: 80

      - name: Update Python coverage badge
        if: github.ref == 'refs/heads/master'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-py-coverage.json
          label: Python coverage
          message: "${{ steps.coverage.outputs.py_coverage }}%"
          valColorRange: ${{ steps.coverage.outputs.py_coverage }}
          minColorRange: 30
          maxColorRange: 80

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-debug-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}

  # ===========================================================================
  # Job 2: Release (ctest + pytest, validates portable build)
  # ===========================================================================
  test-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache

      - name: Install Python dependencies
        run: pip install pytest pybind11 scikit-build-core

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
          restore-keys: ccache-release-${{ runner.os }}-

      - name: Install autocog (release, portable)
        run: |
          pip install ".[server]" --no-build-isolation \
            --config-settings="build-dir=build" \
            --config-settings="cmake.define.AUTOCOG_TUNED=OFF" \
            --config-settings="cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache" \
            --config-settings="cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"

      - name: Run ctest
        working-directory: build
        run: |
          set -o pipefail
          ctest -j$(nproc) --timeout 120 --output-on-failure 2>&1 | tee ctest.log

      - name: Run pytest
        run: |
          set -o pipefail
          python -m pytest tests/integration/modules tests/units/modules \
            --timeout 120 \
            -q 2>&1 | tee pytest.log

      - name: Job summary
        run: |
          python3 << 'PYEOF'
          import re, os

          with open("build/ctest.log") as f:
            m = re.search(r"(\d+) tests passed", f.read())
            ctest = m.group(1) if m else "?"
          with open("pytest.log") as f:
            m = re.search(r"(\d+) passed", f.read())
            pytest = m.group(1) if m else "?"

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("### Release Build Results\n")
            f.write("| Metric | Value |\n")
            f.write("|--------|-------|\n")
            f.write(f"| ctest | {ctest} passed |\n")
            f.write(f"| pytest | {pytest} passed |\n")
          PYEOF

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
