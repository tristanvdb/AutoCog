name: CI

on:
  push:
    branches: [develop, candidate, '*-dev']

permissions:
  contents: read

jobs:
  # ===========================================================================
  # Job 0: git-guard — enforce linear history off master (no merge commits, and
  # HEAD must descend from master). Runs on every branch and fails the run if
  # tripped. On develop a red run just means "rebase before promoting"; on
  # candidate it is in the release's required-jobs list, so it blocks releases.
  # ===========================================================================
  git-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # need full history + master for merge-base

      - name: Check linear history descending from master
        run: |
          git fetch origin master --quiet
          # HEAD must descend from master (master is an ancestor).
          if ! git merge-base --is-ancestor origin/master HEAD; then
            echo "::error::HEAD does not descend from origin/master — rebase onto master."
            exit 1
          fi
          # No merge commits in the commits this branch adds over master.
          merges=$(git rev-list --merges origin/master..HEAD)
          if [ -n "$merges" ]; then
            echo "::error::merge commits found in origin/master..HEAD (linear history required):"
            git log --oneline --merges origin/master..HEAD
            exit 1
          fi
          echo "Linear history OK (descends from master, no merge commits)."

  # ===========================================================================
  # Job 1: check-deps — dependency-group / extras drift (no build)
  # ===========================================================================
  check-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Check dependency-group drift
        run: python tests/scripts/check_dep_group_drift.py

  # ===========================================================================
  # Job 2: check-release — user-POV install of .[server,validate] + smoke
  # ===========================================================================
  check-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
          restore-keys: ccache-release-${{ runner.os }}-

      # Mimic a user install: resolve runtime deps via the extras (no test
      # group), build the wheel. ccache + --no-build-isolation are CI-speed
      # concessions; the .[server,validate] dep path is what mirrors the user.
      - name: Upgrade pip / build backend
        run: pip install --upgrade pip scikit-build-core pybind11

      - name: Install autocog[server,validate] (user path)
        run: |
          pip install ".[server,validate]" --no-build-isolation \
            --config-settings="build-dir=build" \
            --config-settings="cmake.define.AUTOCOG_TUNED=OFF" \
            --config-settings="cmake.define.CMAKE_CXX_COMPILER_LAUNCHER=ccache" \
            --config-settings="cmake.define.CMAKE_C_COMPILER_LAUNCHER=ccache"

      - name: Smoke test
        run: tests/scripts/smoke.sh

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}

  # ===========================================================================
  # Job 3: tests-release — Release build, ctest + pytest (no coverage).
  # Full pipeline only: runs on candidate, not on develop/*-dev.
  # ===========================================================================
  tests-release:
    if: github.ref == 'refs/heads/candidate'
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: build
      BUILD_TYPE: Release
      COVERAGE: OFF
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
          restore-keys: ccache-release-${{ runner.os }}-

      # Seed the test group (pytest, golden-compare deps, server deps) into the
      # system interpreter; steps/build.sh installs autocog with --no-deps.
      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install --group pyproject.toml:test scikit-build-core pybind11

      - name: Build (release)
        run: tests/scripts/steps/build.sh

      - name: ctest
        run: tests/scripts/steps/ctest.sh

      - name: pytest
        run: tests/scripts/steps/pytest.sh

      - name: Assert no pytest skips
        run: |
          if grep -qE '[0-9]+ skipped' build/pytest.log; then
            echo "::error::pytest reported skipped tests; CI requires zero skips"
            grep -E '[0-9]+ skipped' build/pytest.log
            exit 1
          fi
          echo "No skipped tests."

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-release-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}

  # ===========================================================================
  # Job 4: tests-coverage — Debug + coverage, ctest + pytest, report + badges
  # ===========================================================================
  tests-coverage:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: build
      BUILD_TYPE: Debug
      COVERAGE: ON
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ccache gcovr

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cache/ccache
          key: ccache-debug-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}
          restore-keys: ccache-debug-${{ runner.os }}-

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install --group pyproject.toml:test scikit-build-core pybind11

      - name: Build (debug + coverage)
        run: tests/scripts/steps/build.sh

      - name: ctest
        run: tests/scripts/steps/ctest.sh

      - name: pytest (with coverage)
        run: COV=1 tests/scripts/steps/pytest.sh

      - name: Assert no pytest skips
        run: |
          # Skips are how missing prerequisites (e.g. the real model) quietly
          # drop coverage. Fail if pytest reported any.
          if grep -qE '[0-9]+ skipped' build/pytest.log; then
            echo "::error::pytest reported skipped tests; CI requires zero skips"
            grep -E '[0-9]+ skipped' build/pytest.log
            exit 1
          fi
          echo "No skipped tests."

      - name: C++ coverage (gcovr)
        run: tests/scripts/steps/cxx-report.sh

      - name: Coverage report
        run: tests/scripts/steps/report.sh

      # report.sh (above) wrote tests/coverage.{md,json} and exited nonzero if a
      # gating category missed threshold (failing the job). This step runs
      # regardless (if: always()) to surface the numbers and per-metric badge
      # colors. Missing/unparseable JSON -> grey "unknown" badges.
      - name: Read coverage summary
        id: coverage
        if: always()
        run: |
          python3 << 'PYEOF'
          import json, os
          out = open(os.environ["GITHUB_OUTPUT"], "a")
          def emit(k, v): out.write(f"{k}={v}\n")
          try:
            with open("tests/coverage.json") as f:
              s = json.load(f)
          except Exception as e:
            print(f"no coverage.json ({e}); badges -> grey")
            for k in ("ctest","pytest","cxx","cxx_templates","python"):
              emit(f"{k}_msg", "unknown"); emit(f"{k}_color", "lightgrey")
            raise SystemExit(0)
          def cov(name):
            n = s.get(name)
            if not n:
              return ("unknown", "lightgrey")
            return (f"{n['measured']}%", "brightgreen" if n["pass"] else "red")
          for name in ("cxx","cxx_templates","python"):
            msg, color = cov(name)
            emit(f"{name}_msg", msg); emit(f"{name}_color", color)
          for name in ("ctest","pytest"):
            v = s.get(name)
            emit(f"{name}_msg", f"{v} passed" if v is not None else "unknown")
            emit(f"{name}_color", "brightgreen" if v is not None else "lightgrey")
          print(f"pass={s.get('pass')} total={s.get('total')}% "
                f"cxx={s['cxx']['measured']} templates={s['cxx_templates']['measured']} "
                f"python={s['python']['measured']} ctest={s.get('ctest')} pytest={s.get('pytest')}")
          PYEOF

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            tests/coverage.md
            tests/coverage.json

      - name: Job summary
        if: always()
        run: |
          echo "### Coverage Build Results" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ctest | ${{ steps.coverage.outputs.ctest_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pytest | ${{ steps.coverage.outputs.pytest_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ coverage | ${{ steps.coverage.outputs.cxx_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| C++ templates | ${{ steps.coverage.outputs.cxx_templates_msg }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python coverage | ${{ steps.coverage.outputs.python_msg }} |" >> $GITHUB_STEP_SUMMARY

      # --- master badges: live data; grey when stats were not produced --------
      # if: always() so a failure earlier in the job still publishes a (grey)
      # badge rather than leaving a stale green one. The outputs are empty unless
      # the Extract summary step ran, which yields the grey/unknown fallback.
      - name: Candidate ctest badge
        if: always() && github.ref == 'refs/heads/candidate'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-ctest.json
          label: ctest
          message: ${{ steps.coverage.outputs.ctest_msg }}
          color: ${{ steps.coverage.outputs.ctest_color }}

      - name: Candidate pytest badge
        if: always() && github.ref == 'refs/heads/candidate'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-pytest.json
          label: pytest
          message: ${{ steps.coverage.outputs.pytest_msg }}
          color: ${{ steps.coverage.outputs.pytest_color }}

      - name: Candidate C++ coverage badge
        if: always() && github.ref == 'refs/heads/candidate'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-cxx-coverage.json
          label: C++ coverage
          message: ${{ steps.coverage.outputs.cxx_msg }}
          color: ${{ steps.coverage.outputs.cxx_color }}

      - name: Candidate C++ templates badge
        if: always() && github.ref == 'refs/heads/candidate'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-cxx-templates.json
          label: C++ templates
          message: ${{ steps.coverage.outputs.cxx_templates_msg }}
          color: ${{ steps.coverage.outputs.cxx_templates_color }}

      - name: Candidate Python coverage badge
        if: always() && github.ref == 'refs/heads/candidate'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-py-coverage.json
          label: Python coverage
          message: ${{ steps.coverage.outputs.python_msg }}
          color: ${{ steps.coverage.outputs.python_color }}

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cache/ccache
          key: ccache-debug-${{ runner.os }}-${{ hashFiles('libs/**', 'bindings/**', 'vendors/**') }}

  # ===========================================================================
  # ci-status — single source of CI truth for the candidate status badge.
  # Needs all CI jobs; runs always so it can report red on any failure. The
  # badge carries the short commit hash, colored green only if every needed job
  # succeeded (a skipped job — e.g. tests-release off-candidate — is not a
  # failure). Replaces the native CI workflow badge so it can show the hash.
  # ===========================================================================
  ci-status:
    needs: [git-guard, check-deps, check-release, tests-release, tests-coverage]
    if: always() && github.ref == 'refs/heads/candidate'
    runs-on: ubuntu-latest
    steps:
      - name: Compute status
        id: s
        run: |
          short="${GITHUB_SHA:0:7}"
          echo "short_sha=$short" >> "$GITHUB_OUTPUT"
          # Green only if no needed job failed or was cancelled. results is a
          # space-separated list of each needed job's result.
          results="${{ join(needs.*.result, ' ') }}"
          echo "needed results: $results"
          ok=true
          for r in $results; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then ok=false; fi
          done
          echo "color=$([ "$ok" = true ] && echo brightgreen || echo red)" >> "$GITHUB_OUTPUT"

      - name: Candidate CI status badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: 2b5d528fd69eb7528731a4ca2b5ca3ae
          filename: autocog-candidate-status.json
          label: candidate
          message: ${{ steps.s.outputs.short_sha }}
          color: ${{ steps.s.outputs.color }}
